<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Eastern State Alt Text Assistant</title>
    <link rel="stylesheet" href="settings.css" />
  </head>
  <body>
    <main class="container">
      <header class="header">
        <img src="../assets/icon.png" alt="" class="logo" />
        <div>
          <h1>Alt Text Assistant</h1>
          <p>Eastern State ExpressionEngine files</p>
        </div>
      </header>

      <section class="panel">
        <h2>Readiness</h2>
        <div class="status-row">
          <span id="cms-status" class="dot-status">Checking CMS page</span>
          <span id="chatgpt-status" class="dot-status">Checking ChatGPT</span>
        </div>
        <button id="open-chatgpt" class="secondary-button" type="button">
          Open ChatGPT
        </button>
      </section>

      <section class="panel">
        <h2>Run</h2>
        <div class="button-row">
          <button id="scan" type="button">Scan</button>
          <button id="start" type="button">Start Saving</button>
          <button id="stop" class="danger-button" type="button">Stop</button>
        </div>
        <p id="run-status" class="status-text">Idle.</p>
        <p id="current-item" class="current-item"></p>
      </section>

      <section class="panel">
        <h2>Counts</h2>
        <dl class="counts-grid">
          <div>
            <dt>Images</dt>
            <dd id="count-images">0</dd>
          </div>
          <div>
            <dt>Skip</dt>
            <dd id="count-skip">0</dd>
          </div>
          <div>
            <dt>Shorten</dt>
            <dd id="count-shorten">0</dd>
          </div>
          <div>
            <dt>Generate</dt>
            <dd id="count-generate">0</dd>
          </div>
          <div>
            <dt>Saved</dt>
            <dd id="count-saved">0</dd>
          </div>
          <div>
            <dt>Failed</dt>
            <dd id="count-failed">0</dd>
          </div>
        </dl>
      </section>

      <section class="panel">
        <h2>Progress Log</h2>
        <ol id="log" class="log-list"></ol>
      </section>
    </main>

    <script src="settings.js"></script>
  </body>
</html>
